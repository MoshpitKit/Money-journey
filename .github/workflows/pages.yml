name: Deploy to GitHub Pages

# Builds the site for the /money-journey project subpath and deploys it to
# GitHub Pages — live at https://moshpitkit.github.io/money-journey/
# (When you move to a custom domain, drop PAGES_BASE/PUBLIC_SITE_URL and point
#  the domain at Pages, or switch to Cloudflare via deploy.yml.)

on:
  push:
    # GitHub Pages only deploys from the default branch. Until 'main' is made the
    # default, the default branch below is what auto-deploys on push.
    branches: [main, "claude/affectionate-davinci-1x4tx7"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_BASE: /money-journey
      PUBLIC_SITE_URL: https://moshpitkit.github.io
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Rewrite links for subpath
        run: node scripts/rewrite-base.mjs
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
